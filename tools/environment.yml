# Conda environment for generating fugazi's reference fixtures.
#
#   conda env create -f tools/environment.yml
#   conda activate fugazi-talib
#   python3 tools/gen_talib_fixtures.py     # TA-Lib indicator reference
#   python3 tools/gen_metrics_fixtures.py   # empyrical metrics reference
#
# conda-forge ships the TA-Lib C library together with the Python wrapper, so
# no separate system install (brew/apt) is needed. `empyrical` powers the
# metrics cross-check (Sharpe/Sortino/max-DD/VaR/CVaR/…) — see
# `tests/metrics_validation.rs`.
name: fugazi-talib
channels:
  - conda-forge
dependencies:
  - python>=3.10
  - numpy
  - ta-lib
  - empyrical
